<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - CCS Sit-in Monitoring System</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f5f5f5;
            min-height: 100vh;
        }

        /* Navbar */
        .navbar {
            background-color: #1a3a6b;
        }
        .navbar-brand {
            color: #fff !important;
            font-size: 1rem;
            font-weight: 500;
        }
        .nav-link {
            color: #fff !important;
            font-size: 0.95rem;
        }
        .nav-link:hover {
            color: #ddd !important;
        }

        .welcome-section {
            min-height: calc(100vh - 56px);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }
        .welcome-card {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 2px 16px rgba(0,0,0,0.08);
            padding: 50px 60px;
            text-align: center;
            max-width: 550px;
            width: 100%;
        }
        .welcome-card .success-icon {
            font-size: 4rem;
            margin-bottom: 16px;
        }
        .welcome-card h2 {
            color: #198754;
            font-weight: 700;
            font-size: 1.8rem;
            margin-bottom: 10px;
        }
        .welcome-card .user-name {
            font-size: 1.1rem;
            color: #333;
            margin-bottom: 6px;
        }
        .welcome-card .user-info {
            font-size: 0.9rem;
            color: #777;
            margin-bottom: 24px;
        }
        .btn-logout {
            background-color: #dc3545;
            border: none;
            color: #fff;
            padding: 10px 32px;
            border-radius: 6px;
            font-weight: 600;
        }
        .btn-logout:hover {
            background-color: #c82333;
            color: #fff;
        }

        @media (max-width: 576px) {
            .welcome-card {
                padding: 36px 24px;
            }
        }
    </style>
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="index.html">College of Computer Studies Sit-in Monitoring System</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#" id="logoutLink">Logout</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Welcome Section -->
    <div class="welcome-section">
        <div class="welcome-card">
            <div class="success-icon">✅</div>
            <h2>Login Successful!</h2>
            <p class="user-name" id="userName">Welcome!</p>
            <p class="user-info" id="userInfo"></p>
            <button class="btn btn-logout" id="logoutBtn">Logout</button>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        // Check if user is logged in
        const userData = localStorage.getItem('ccs_user');
        if (!userData) {
            // Not logged in, redirect to login
            window.location.href = 'login.html';
        } else {
            const user = JSON.parse(userData);
            document.getElementById('userName').textContent = `Welcome, ${user.first_name} ${user.last_name}!`;
            document.getElementById('userInfo').textContent = `ID: ${user.id_number} | ${user.course} - Year ${user.year_level}`;
        }

        // Logout
        function logout() {
            localStorage.removeItem('ccs_user');
            window.location.href = 'login.html';
        }
        document.getElementById('logoutBtn').addEventListener('click', logout);
        document.getElementById('logoutLink').addEventListener('click', function (e) {
            e.preventDefault();
            logout();
        });
    </script>
</body>
</html>
