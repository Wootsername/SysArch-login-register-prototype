<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CCS Sit-in Monitoring System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; }

        body {
            margin: 0; min-height: 100vh;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #0a1628 0%, #0d2137 40%, #0f2b46 100%);
            color: #e0e6ed; overflow-x: hidden;
        }

        /* ── Animated Glowing Orbs ── */
        .orb-container { position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden; }
        .orb { position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.35; animation: orbFloat 18s ease-in-out infinite alternate; }
        .orb-1 { width: 420px; height: 420px; background: #2196F3; top: -10%; left: -8%; animation-duration: 20s; }
        .orb-2 { width: 350px; height: 350px; background: #7c3aed; bottom: -12%; right: -6%; animation-duration: 24s; animation-delay: -5s; }
        .orb-3 { width: 280px; height: 280px; background: #06b6d4; top: 50%; left: 55%; animation-duration: 22s; animation-delay: -10s; }
        @keyframes orbFloat {
            0%   { transform: translate(0, 0) scale(1); }
            33%  { transform: translate(60px, -40px) scale(1.1); }
            66%  { transform: translate(-30px, 50px) scale(0.95); }
            100% { transform: translate(20px, -20px) scale(1.05); }
        }

        /* ── Page Transition ── */
        .page-wrapper { position: relative; z-index: 1; animation: pageIn 0.6s cubic-bezier(.4,0,.2,1) both; }
        @keyframes pageIn { from { opacity: 0; transform: translateY(24px); } to { opacity: 1; transform: translateY(0); } }
        .page-exit { animation: pageOut 0.35s cubic-bezier(.4,0,.2,1) forwards; }
        @keyframes pageOut { to { opacity: 0; transform: translateY(-18px) scale(0.98); } }

        /* ── Glassmorphism Navbar ── */
        .navbar {
            background: rgba(26, 58, 107, 0.55);
            backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px);
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }
        .navbar-brand { color: #fff !important; font-size: 1rem; font-weight: 600; }
        .nav-link { color: rgba(255,255,255,0.85) !important; font-size: 0.95rem; transition: color .2s; }
        .nav-link:hover, .nav-link.active { color: #fff !important; }
        .dropdown-menu {
            background: rgba(15, 30, 55, 0.9); backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 8px;
        }
        .dropdown-item { color: #cdd6e0; }
        .dropdown-item:hover { background: rgba(33,150,243,0.2); color: #fff; }

        /* ── Hero ── */
        .hero-section {
            min-height: calc(100vh - 56px);
            display: flex; align-items: center; justify-content: center;
            text-align: center; padding: 40px 20px;
        }
        .hero-inner { animation: heroReveal 1s ease-out 0.3s both; }
        @keyframes heroReveal { from { opacity: 0; transform: translateY(40px) scale(0.96); } to { opacity: 1; transform: translateY(0) scale(1); } }

        .hero-logo {
            max-width: 260px; margin-bottom: 30px;
            filter: drop-shadow(0 0 30px rgba(33,150,243,0.3));
            animation: logoPulse 4s ease-in-out infinite;
        }
        @keyframes logoPulse {
            0%, 100% { filter: drop-shadow(0 0 20px rgba(33,150,243,0.25)); }
            50%      { filter: drop-shadow(0 0 40px rgba(33,150,243,0.5)); }
        }
        .hero-title {
            font-size: 2.4rem; font-weight: 800;
            background: linear-gradient(135deg, #fff 0%, #93c5fd 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text; margin-bottom: 10px;
        }
        .hero-subtitle { font-size: 1.15rem; color: rgba(255,255,255,0.55); margin-bottom: 40px; }

        .hero-buttons .btn {
            padding: 14px 40px; font-size: 1rem; font-weight: 600;
            border-radius: 10px; margin: 0 8px;
            transition: all 0.3s cubic-bezier(.4,0,.2,1);
        }
        .btn-hero-login {
            background: linear-gradient(135deg, #2196F3, #1976D2);
            border: none; color: #fff; box-shadow: 0 4px 20px rgba(33,150,243,0.35);
        }
        .btn-hero-login:hover { transform: translateY(-2px); color: #fff; box-shadow: 0 8px 30px rgba(33,150,243,0.5); }
        .btn-hero-register {
            background: rgba(255,255,255,0.08); backdrop-filter: blur(10px);
            border: 1.5px solid rgba(255,255,255,0.25); color: #fff;
        }
        .btn-hero-register:hover { background: rgba(255,255,255,0.18); color: #fff; transform: translateY(-2px); border-color: rgba(255,255,255,0.45); }

        /* ── Stats Panel ── */
        .stats-panel {
            margin-top: 60px; display: flex; gap: 20px;
            justify-content: center; flex-wrap: wrap;
            animation: heroReveal 1s ease-out 0.7s both;
        }
        .stat-card {
            background: rgba(255,255,255,0.06);
            backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 14px; padding: 24px 32px; text-align: center; min-width: 160px;
            transition: transform 0.3s, box-shadow 0.3s;
        }
        .stat-card:hover { transform: translateY(-4px); box-shadow: 0 8px 32px rgba(33,150,243,0.15); border-color: rgba(33,150,243,0.3); }
        .stat-number {
            font-size: 2rem; font-weight: 800;
            background: linear-gradient(135deg, #60a5fa, #38bdf8);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
        }
        .stat-label { font-size: 0.82rem; color: rgba(255,255,255,0.5); text-transform: uppercase; letter-spacing: 1px; margin-top: 4px; }

        /* ── Toast ── */
        .toast-container-custom { position: fixed; top: 70px; right: 20px; z-index: 9999; display: flex; flex-direction: column; gap: 8px; }
        .toast-notif {
            padding: 14px 22px; border-radius: 12px; color: #fff;
            font-size: 0.92rem; font-weight: 500; min-width: 300px;
            backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            animation: toastIn 0.45s cubic-bezier(.21,1.02,.73,1) both;
            display: flex; align-items: center; gap: 10px;
        }
        .toast-notif.success { background: rgba(22,163,74,0.85); }
        .toast-notif.error   { background: rgba(220,38,38,0.85); }
        .toast-notif.warning { background: rgba(234,179,8,0.85); color: #1a1a1a; }
        .toast-notif .toast-icon { font-size: 1.2rem; }
        @keyframes toastIn { from { opacity: 0; transform: translateX(40px) scale(0.9); } to { opacity: 1; transform: translateX(0) scale(1); } }
        @keyframes toastOut { to { opacity: 0; transform: translateX(40px) scale(0.9); } }

        @media (max-width: 576px) {
            .hero-logo { max-width: 180px; }
            .hero-title { font-size: 1.6rem; }
            .hero-buttons .btn { display: block; width: 100%; margin: 8px 0; }
            .stats-panel { flex-direction: column; align-items: center; }
            .stat-card { min-width: 220px; }
        }
    </style>
</head>
<body>
    <!-- Glowing Orbs -->
    <div class="orb-container"><div class="orb orb-1"></div><div class="orb orb-2"></div><div class="orb orb-3"></div></div>

    <div class="page-wrapper">
        <!-- Navbar -->
        <nav class="navbar navbar-expand-lg navbar-dark">
            <div class="container-fluid">
                <a class="navbar-brand" href="index.html"><i class="bi bi-mortarboard-fill me-2"></i>CCS Sit-in Monitoring</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"><span class="navbar-toggler-icon"></span></button>
                <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
                    <ul class="navbar-nav">
                        <li class="nav-item"><a class="nav-link active" href="index.html">Home</a></li>
                        <li class="nav-item dropdown">
                            <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown">Community</a>
                            <ul class="dropdown-menu">
                                <li><a class="dropdown-item" href="#">Announcements</a></li>
                                <li><a class="dropdown-item" href="#">Events</a></li>
                            </ul>
                        </li>
                        <li class="nav-item"><a class="nav-link" href="#">About</a></li>
                        <li class="nav-item"><a class="nav-link" href="login.html">Login</a></li>
                        <li class="nav-item"><a class="nav-link" href="register.html">Register</a></li>
                    </ul>
                </div>
            </div>
        </nav>

        <div class="toast-container-custom" id="toastContainer"></div>

        <!-- Hero -->
        <div class="hero-section">
            <div class="hero-inner">
                <img src="assets/ccs-logo.png" alt="CCS Logo" class="hero-logo">
                <h1 class="hero-title">College of Computer Studies</h1>
                <p class="hero-subtitle">University of Cebu &mdash; Sit-in Monitoring System</p>
                <div class="hero-buttons">
                    <a href="login.html" class="btn btn-hero-login page-link"><i class="bi bi-box-arrow-in-right me-1"></i> Login</a>
                    <a href="register.html" class="btn btn-hero-register page-link"><i class="bi bi-person-plus me-1"></i> Register</a>
                </div>
                <div class="stats-panel">
                    <div class="stat-card"><div class="stat-number" data-target="1240">0</div><div class="stat-label">Students</div></div>
                    <div class="stat-card"><div class="stat-number" data-target="8">0</div><div class="stat-label">Labs</div></div>
                    <div class="stat-card"><div class="stat-number" data-target="5630">0</div><div class="stat-label">Sit-ins</div></div>
                    <div class="stat-card"><div class="stat-number" data-target="98">0</div><div class="stat-label">% Uptime</div></div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        /* Animated Number Counters */
        function animateCounters() {
            document.querySelectorAll('.stat-number[data-target]').forEach(el => {
                const target = +el.dataset.target;
                const duration = 2000;
                const start = performance.now();
                function tick(now) {
                    const p = Math.min((now - start) / duration, 1);
                    const eased = 1 - Math.pow(1 - p, 3);
                    el.textContent = Math.floor(target * eased).toLocaleString();
                    if (p < 1) requestAnimationFrame(tick);
                    else el.textContent = target.toLocaleString();
                }
                requestAnimationFrame(tick);
            });
        }
        const sp = document.querySelector('.stats-panel');
        if (sp) {
            const obs = new IntersectionObserver(entries => {
                entries.forEach(e => { if (e.isIntersecting) { animateCounters(); obs.unobserve(e.target); } });
            }, { threshold: 0.3 });
            obs.observe(sp);
        }

        /* Smooth Page Transitions */
        document.querySelectorAll('a.page-link, .navbar-nav a.nav-link').forEach(link => {
            link.addEventListener('click', function(e) {
                const href = this.getAttribute('href');
                if (!href || href === '#' || href.startsWith('javascript')) return;
                e.preventDefault();
                document.querySelector('.page-wrapper').classList.add('page-exit');
                setTimeout(() => { window.location.href = href; }, 350);
            });
        });

        /* Toast */
        function showToast(message, type = 'success') {
            const container = document.getElementById('toastContainer');
            const icons = { success: 'bi-check-circle-fill', error: 'bi-x-circle-fill', warning: 'bi-exclamation-triangle-fill' };
            const toast = document.createElement('div');
            toast.className = `toast-notif ${type}`;
            toast.innerHTML = `<i class="bi ${icons[type] || icons.success} toast-icon"></i><span>${message}</span>`;
            container.appendChild(toast);
            setTimeout(() => { toast.style.animation = 'toastOut 0.35s forwards'; setTimeout(() => toast.remove(), 350); }, 3500);
        }
    </script>
</body>
</html>
