<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - CCS Sit-in Monitoring System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; }

        body {
            margin: 0; min-height: 100vh;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #0a1628 0%, #0d2137 40%, #0f2b46 100%);
            color: #e0e6ed; overflow-x: hidden;
        }

        /* ── Glowing Orbs ── */
        .orb-container { position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden; }
        .orb { position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.35; animation: orbFloat 18s ease-in-out infinite alternate; }
        .orb-1 { width: 420px; height: 420px; background: #2196F3; top: -10%; left: -8%; animation-duration: 20s; }
        .orb-2 { width: 350px; height: 350px; background: #7c3aed; bottom: -12%; right: -6%; animation-duration: 24s; animation-delay: -5s; }
        .orb-3 { width: 280px; height: 280px; background: #06b6d4; top: 50%; left: 55%; animation-duration: 22s; animation-delay: -10s; }
        @keyframes orbFloat {
            0%   { transform: translate(0, 0) scale(1); }
            33%  { transform: translate(60px, -40px) scale(1.1); }
            66%  { transform: translate(-30px, 50px) scale(0.95); }
            100% { transform: translate(20px, -20px) scale(1.05); }
        }

        /* ── Page Transitions ── */
        .page-wrapper { position: relative; z-index: 1; animation: pageIn 0.6s cubic-bezier(.4,0,.2,1) both; }
        @keyframes pageIn { from { opacity: 0; transform: translateY(24px); } to { opacity: 1; transform: translateY(0); } }
        .page-exit { animation: pageOut 0.35s cubic-bezier(.4,0,.2,1) forwards; }
        @keyframes pageOut { to { opacity: 0; transform: translateY(-18px) scale(0.98); } }

        /* ── Glassmorphism Navbar ── */
        .navbar {
            background: rgba(26, 58, 107, 0.55);
            backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px);
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }
        .navbar-brand { color: #fff !important; font-size: 1rem; font-weight: 600; }
        .nav-link { color: rgba(255,255,255,0.85) !important; font-size: 0.95rem; transition: color .2s; }
        .nav-link:hover, .nav-link.active { color: #fff !important; }
        .dropdown-menu {
            background: rgba(15, 30, 55, 0.9); backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 8px;
        }
        .dropdown-item { color: #cdd6e0; }
        .dropdown-item:hover { background: rgba(33,150,243,0.2); color: #fff; }

        /* ── Login Layout ── */
        .login-section {
            min-height: calc(100vh - 56px);
            display: flex; align-items: center; justify-content: center; padding: 40px 20px;
        }
        .login-wrapper {
            display: flex; align-items: center; justify-content: center;
            max-width: 1000px; width: 100%; gap: 60px;
        }
        .logo-side { flex: 1; display: flex; align-items: center; justify-content: center; }
        .logo-side img {
            max-width: 340px; width: 100%; height: auto;
            filter: drop-shadow(0 0 30px rgba(33,150,243,0.3));
            animation: logoPulse 4s ease-in-out infinite;
        }
        @keyframes logoPulse {
            0%, 100% { filter: drop-shadow(0 0 20px rgba(33,150,243,0.25)); }
            50%      { filter: drop-shadow(0 0 40px rgba(33,150,243,0.5)); }
        }

        /* ── Glassmorphism Card ── */
        .form-side {
            flex: 1; max-width: 440px; width: 100%;
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px; padding: 40px 36px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            animation: cardReveal 0.8s ease-out 0.3s both;
        }
        @keyframes cardReveal {
            from { opacity: 0; transform: translateY(30px) scale(0.96); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }
        .form-side h3 {
            font-size: 1.6rem; font-weight: 700; margin-bottom: 4px;
            background: linear-gradient(135deg, #fff, #93c5fd);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
        }
        .form-side .subtitle { color: rgba(255,255,255,0.45); font-size: 0.9rem; margin-bottom: 28px; }

        .form-side .form-label { font-size: 0.85rem; color: rgba(255,255,255,0.6); margin-bottom: 4px; font-weight: 500; }
        .form-side .form-control {
            background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.12);
            border-radius: 10px; padding: 12px 14px; font-size: 0.95rem;
            color: #fff; transition: all 0.3s;
        }
        .form-side .form-control::placeholder { color: rgba(255,255,255,0.3); }
        .form-side .form-control:focus {
            background: rgba(255,255,255,0.1);
            border-color: rgba(33,150,243,0.5);
            box-shadow: 0 0 0 3px rgba(33,150,243,0.15);
            color: #fff;
        }
        .form-side .form-control.is-invalid { border-color: rgba(220,38,38,0.6) !important; }
        .form-side .form-control.is-valid { border-color: rgba(34,197,94,0.5) !important; }

        /* Password toggle */
        .input-group .btn-toggle-pw {
            background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.12);
            border-left: none; color: rgba(255,255,255,0.5); border-radius: 0 10px 10px 0;
            transition: all 0.2s; padding: 0 14px;
        }
        .input-group .btn-toggle-pw:hover { color: #fff; background: rgba(255,255,255,0.12); }
        .input-group .form-control { border-radius: 10px 0 0 10px; }

        .form-options {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 24px; font-size: 0.88rem;
        }
        .form-options .form-check-label { color: rgba(255,255,255,0.6); }
        .form-options .form-check-input {
            background-color: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.2);
        }
        .form-options .form-check-input:checked { background-color: #2196F3; border-color: #2196F3; }
        .form-options a { color: #60a5fa; text-decoration: none; }
        .form-options a:hover { text-decoration: underline; color: #93c5fd; }

        .btn-login {
            background: linear-gradient(135deg, #2196F3, #1976D2);
            border: none; color: #fff; padding: 13px 48px; border-radius: 10px;
            font-size: 1.05rem; font-weight: 600; cursor: pointer;
            transition: all 0.3s; box-shadow: 0 4px 20px rgba(33,150,243,0.3);
        }
        .btn-login:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(33,150,243,0.45); color: #fff; }
        .btn-login:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .btn-wrapper { text-align: center; }

        .form-footer { text-align: center; margin-top: 22px; font-size: 0.93rem; color: rgba(255,255,255,0.5); }
        .form-footer a { color: #60a5fa; text-decoration: none; font-weight: 600; }
        .form-footer a:hover { text-decoration: underline; color: #93c5fd; }

        .field-error { color: #f87171; font-size: 0.78rem; margin-top: 3px; min-height: 18px; }

        /* ── Toast ── */
        .toast-container-custom { position: fixed; top: 70px; right: 20px; z-index: 9999; display: flex; flex-direction: column; gap: 8px; }
        .toast-notif {
            padding: 14px 22px; border-radius: 12px; color: #fff;
            font-size: 0.92rem; font-weight: 500; min-width: 300px;
            backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            animation: toastIn 0.45s cubic-bezier(.21,1.02,.73,1) both;
            display: flex; align-items: center; gap: 10px;
        }
        .toast-notif.success { background: rgba(22,163,74,0.85); }
        .toast-notif.error   { background: rgba(220,38,38,0.85); }
        .toast-notif.warning { background: rgba(234,179,8,0.85); color: #1a1a1a; }
        .toast-notif .toast-icon { font-size: 1.2rem; }
        @keyframes toastIn { from { opacity: 0; transform: translateX(40px) scale(0.9); } to { opacity: 1; transform: translateX(0) scale(1); } }
        @keyframes toastOut { to { opacity: 0; transform: translateX(40px) scale(0.9); } }

        @media (max-width: 768px) {
            .login-wrapper { flex-direction: column; gap: 30px; }
            .logo-side img { max-width: 220px; }
            .form-side { max-width: 100%; padding: 30px 24px; }
        }
    </style>
</head>
<body>
    <!-- Glowing Orbs -->
    <div class="orb-container"><div class="orb orb-1"></div><div class="orb orb-2"></div><div class="orb orb-3"></div></div>

    <div class="page-wrapper">
        <!-- Navbar -->
        <nav class="navbar navbar-expand-lg navbar-dark">
            <div class="container-fluid">
                <a class="navbar-brand" href="index.html"><i class="bi bi-mortarboard-fill me-2"></i>CCS Sit-in Monitoring</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"><span class="navbar-toggler-icon"></span></button>
                <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
                    <ul class="navbar-nav">
                        <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                        <li class="nav-item dropdown">
                            <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown">Community</a>
                            <ul class="dropdown-menu">
                                <li><a class="dropdown-item" href="#">Announcements</a></li>
                                <li><a class="dropdown-item" href="#">Events</a></li>
                            </ul>
                        </li>
                        <li class="nav-item"><a class="nav-link" href="#">About</a></li>
                        <li class="nav-item"><a class="nav-link active" href="login.html">Login</a></li>
                        <li class="nav-item"><a class="nav-link" href="register.html">Register</a></li>
                    </ul>
                </div>
            </div>
        </nav>

        <div class="toast-container-custom" id="toastContainer"></div>

        <!-- Login Section -->
        <div class="login-section">
            <div class="login-wrapper">
                <div class="logo-side">
                    <img src="assets/ccs-logo.png" alt="College of Computer Studies Logo">
                </div>
                <div class="form-side">
                    <h3>Welcome Back</h3>
                    <p class="subtitle">Sign in to your account</p>

                    <form id="loginForm" novalidate>
                        <div class="mb-3">
                            <label class="form-label" for="idNumber"><i class="bi bi-person-badge me-1"></i>ID Number</label>
                            <input type="text" class="form-control" id="idNumber" placeholder="Enter a valid ID number" required>
                            <div class="field-error" id="err-idNumber"></div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label" for="password"><i class="bi bi-lock me-1"></i>Password</label>
                            <div class="input-group">
                                <input type="password" class="form-control" id="password" placeholder="Enter password" required>
                                <button class="btn btn-toggle-pw" type="button" id="togglePassword" aria-label="Toggle password visibility">
                                    <i class="bi bi-eye"></i>
                                </button>
                            </div>
                            <div class="field-error" id="err-password"></div>
                        </div>

                        <div class="form-options">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="rememberMe">
                                <label class="form-check-label" for="rememberMe">Remember me</label>
                            </div>
                            <a href="#" id="forgotPassword">Forgot password?</a>
                        </div>

                        <div class="btn-wrapper">
                            <button type="submit" class="btn btn-login" id="loginBtn">
                                <i class="bi bi-box-arrow-in-right me-1"></i> Login
                            </button>
                        </div>
                    </form>

                    <div class="form-footer">
                        Don't have an account? <a href="register.html" class="page-link-inline">Register</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const API_BASE = 'backend/api/index.php';

        /* ── Toast ── */
        function showToast(message, type = 'success') {
            const container = document.getElementById('toastContainer');
            const icons = { success: 'bi-check-circle-fill', error: 'bi-x-circle-fill', warning: 'bi-exclamation-triangle-fill' };
            const toast = document.createElement('div');
            toast.className = `toast-notif ${type}`;
            toast.innerHTML = `<i class="bi ${icons[type] || icons.success} toast-icon"></i><span>${message}</span>`;
            container.appendChild(toast);
            setTimeout(() => { toast.style.animation = 'toastOut 0.35s forwards'; setTimeout(() => toast.remove(), 350); }, 3500);
        }

        /* ── Toggle Password ── */
        document.getElementById('togglePassword').addEventListener('click', function () {
            const pw = document.getElementById('password');
            const icon = this.querySelector('i');
            if (pw.type === 'password') { pw.type = 'text'; icon.classList.replace('bi-eye', 'bi-eye-slash'); }
            else { pw.type = 'password'; icon.classList.replace('bi-eye-slash', 'bi-eye'); }
        });

        /* ── Remember Me ── */
        window.addEventListener('DOMContentLoaded', function () {
            const savedId = localStorage.getItem('ccs_remember_id');
            if (savedId) { document.getElementById('idNumber').value = savedId; document.getElementById('rememberMe').checked = true; }
        });

        /* ── Forgot Password ── */
        document.getElementById('forgotPassword').addEventListener('click', function (e) {
            e.preventDefault();
            showToast('Please contact admin to reset your password.', 'warning');
        });

        /* ── Validation Helpers ── */
        function setLoginError(fieldId, message) {
            const el = document.getElementById(fieldId);
            const errEl = document.getElementById('err-' + fieldId);
            if (el) { el.classList.add('is-invalid'); el.classList.remove('is-valid'); }
            if (errEl) errEl.textContent = message;
        }
        function setLoginValid(fieldId) {
            const el = document.getElementById(fieldId);
            const errEl = document.getElementById('err-' + fieldId);
            if (el) { el.classList.remove('is-invalid'); el.classList.add('is-valid'); }
            if (errEl) errEl.textContent = '';
        }

        ['idNumber', 'password'].forEach(fieldId => {
            const el = document.getElementById(fieldId);
            if (el) {
                el.addEventListener('input', function () {
                    if (this.classList.contains('is-invalid') && this.value.trim()) setLoginValid(fieldId);
                });
                el.addEventListener('blur', function () {
                    if (!this.value.trim()) setLoginError(fieldId, fieldId === 'idNumber' ? 'ID Number is required' : 'Password is required');
                });
            }
        });

        /* ── Login Submit ── */
        document.getElementById('loginForm').addEventListener('submit', async function (e) {
            e.preventDefault();
            const idNumber = document.getElementById('idNumber').value.trim();
            const password = document.getElementById('password').value;
            const remember = document.getElementById('rememberMe').checked;
            const loginBtn = document.getElementById('loginBtn');

            let hasError = false;
            if (!idNumber) { setLoginError('idNumber', 'ID Number is required'); hasError = true; } else { setLoginValid('idNumber'); }
            if (!password) { setLoginError('password', 'Password is required'); hasError = true; } else { setLoginValid('password'); }
            if (hasError) { showToast('Please fill in all required fields', 'error'); const fi = document.querySelector('.is-invalid'); if (fi) fi.focus(); return; }

            loginBtn.disabled = true;
            loginBtn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span> Signing in...';

            try {
                const res = await fetch(`${API_BASE}?action=login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ id_number: idNumber, password: password })
                });
                const data = await res.json().catch(() => null);

                if (!res.ok) {
                    showToast(data?.message || `Login failed (${res.status})`, 'error');
                    return;
                }

                if (data.success) {
                    if (remember) localStorage.setItem('ccs_remember_id', idNumber);
                    else localStorage.removeItem('ccs_remember_id');
                    showToast('Login successful! Welcome back.', 'success');
                    localStorage.setItem('ccs_user', JSON.stringify(data.user));
                    const destination = data.user?.role === 'admin' ? 'admin-dashboard.html' : 'dashboard.html';
                    setTimeout(() => { window.location.href = destination; }, 1500);
                } else {
                    showToast(data.message || 'Login failed', 'error');
                }
            } catch (err) {
                showToast('Network error. Please try again.', 'error');
            } finally {
                loginBtn.disabled = false;
                loginBtn.innerHTML = '<i class="bi bi-box-arrow-in-right me-1"></i> Login';
            }
        });

        /* ── Smooth Page Transitions ── */
        document.querySelectorAll('.navbar-nav a.nav-link, .page-link-inline').forEach(link => {
            link.addEventListener('click', function(e) {
                const href = this.getAttribute('href');
                if (!href || href === '#' || href.startsWith('javascript')) return;
                e.preventDefault();
                document.querySelector('.page-wrapper').classList.add('page-exit');
                setTimeout(() => { window.location.href = href; }, 350);
            });
        });
    </script>
</body>
</html>
