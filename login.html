<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - CCS Sit-in Monitoring System</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f5f5f5;
            min-height: 100vh;
        }

        /* Navbar */
        .navbar {
            background-color: #1a3a6b;
        }
        .navbar-brand {
            color: #fff !important;
            font-size: 1rem;
            font-weight: 500;
        }
        .nav-link {
            color: #fff !important;
            font-size: 0.95rem;
        }
        .nav-link:hover {
            color: #ddd !important;
        }
        .dropdown-menu {
            background-color: #fff;
        }

        /* Login Section */
        .login-section {
            min-height: calc(100vh - 56px);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }
        .login-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            max-width: 1000px;
            width: 100%;
            gap: 60px;
        }

        /* Logo Side */
        .logo-side {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .logo-side img {
            max-width: 380px;
            width: 100%;
            height: auto;
        }

        /* Form Side */
        .form-side {
            flex: 1;
            max-width: 420px;
            width: 100%;
        }
        .form-side .form-control {
            border-radius: 6px;
            padding: 12px 14px;
            font-size: 0.95rem;
            border: 1px solid #ced4da;
        }
        .form-side .form-control:focus {
            border-color: #1a3a6b;
            box-shadow: 0 0 0 0.2rem rgba(26, 58, 107, 0.15);
        }
        .form-side .form-label {
            font-size: 0.88rem;
            color: #555;
            margin-bottom: 2px;
        }

        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            font-size: 0.9rem;
        }
        .form-options a {
            color: #1a3a6b;
            text-decoration: none;
        }
        .form-options a:hover {
            text-decoration: underline;
        }

        .btn-login {
            background-color: #2196F3;
            border: none;
            color: #fff;
            padding: 12px 48px;
            border-radius: 6px;
            font-size: 1.05rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        .btn-login:hover {
            background-color: #1976D2;
            color: #fff;
        }
        .btn-login:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .form-footer {
            text-align: center;
            margin-top: 20px;
            font-size: 0.95rem;
            font-weight: 600;
        }
        .form-footer a {
            color: #2196F3;
            text-decoration: none;
            font-weight: 600;
        }
        .form-footer a:hover {
            text-decoration: underline;
        }

        .btn-wrapper {
            text-align: center;
        }

        .field-error {
            color: #dc3545;
            font-size: 0.78rem;
            margin-top: 2px;
            min-height: 18px;
        }
        .form-control.is-invalid {
            border-color: #dc3545 !important;
        }
        .form-control.is-valid {
            border-color: #198754 !important;
        }

        /* Toast Notification */
        .toast-container-custom {
            position: fixed;
            top: 70px;
            right: 20px;
            z-index: 9999;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .login-wrapper {
                flex-direction: column;
                gap: 30px;
            }
            .logo-side img {
                max-width: 250px;
            }
            .form-side {
                max-width: 100%;
            }
        }
    </style>
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="index.html">College of Computer Studies Sit-in Monitoring System</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">Home</a>
                    </li>
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown">
                            Community
                        </a>
                        <ul class="dropdown-menu">
                            <li><a class="dropdown-item" href="#">Announcements</a></li>
                            <li><a class="dropdown-item" href="#">Events</a></li>
                        </ul>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">About</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="login.html">Login</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="register.html">Register</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Toast Notification Container -->
    <div class="toast-container-custom" id="toastContainer"></div>

    <!-- Login Section -->
    <div class="login-section">
        <div class="login-wrapper">
            <!-- Logo Side -->
            <div class="logo-side">
                <img src="assets/ccs-logo.png" alt="College of Computer Studies Logo">
            </div>

            <!-- Form Side -->
            <div class="form-side">
                <form id="loginForm" novalidate>
                    <div class="mb-3">
                        <input type="text" class="form-control" id="idNumber" placeholder="Enter a valid id number" required>
                        <label class="form-label mt-1" for="idNumber">ID Number</label>
                        <div class="field-error" id="err-idNumber"></div>
                    </div>
                    <div class="mb-3">
                        <div class="input-group">
                            <input type="password" class="form-control" id="password" placeholder="Enter password" required>
                            <button class="btn btn-outline-secondary" type="button" id="togglePassword">
                                <i class="bi bi-eye"></i>
                            </button>
                        </div>
                        <label class="form-label mt-1" for="password">Password</label>
                        <div class="field-error" id="err-password"></div>
                    </div>

                    <div class="form-options">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="rememberMe">
                            <label class="form-check-label" for="rememberMe">Remember me</label>
                        </div>
                        <a href="#" id="forgotPassword">Forgot password?</a>
                    </div>

                    <div class="btn-wrapper">
                        <button type="submit" class="btn btn-login" id="loginBtn">Login</button>
                    </div>
                </form>

                <div class="form-footer">
                    Don't have an account? <a href="register.html">Register</a>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        const API_BASE = 'backend/api/index.php';

        // Toast notification function
        function showToast(message, type = 'success') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            const bgColor = type === 'success' ? '#198754' : type === 'error' ? '#dc3545' : '#ffc107';
            const textColor = type === 'warning' ? '#000' : '#fff';
            toast.className = 'alert shadow-sm';
            toast.style.cssText = `background:${bgColor};color:${textColor};padding:12px 20px;border-radius:6px;margin-bottom:8px;animation:fadeIn 0.3s;min-width:280px;`;
            toast.textContent = message;
            container.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transition = 'opacity 0.3s';
                setTimeout(() => toast.remove(), 300);
            }, 3500);
        }

        // Toggle password visibility
        document.getElementById('togglePassword').addEventListener('click', function () {
            const pw = document.getElementById('password');
            const icon = this.querySelector('i');
            if (pw.type === 'password') {
                pw.type = 'text';
                icon.classList.replace('bi-eye', 'bi-eye-slash');
            } else {
                pw.type = 'password';
                icon.classList.replace('bi-eye-slash', 'bi-eye');
            }
        });

        // Remember me - load saved ID
        window.addEventListener('DOMContentLoaded', function () {
            const savedId = localStorage.getItem('ccs_remember_id');
            if (savedId) {
                document.getElementById('idNumber').value = savedId;
                document.getElementById('rememberMe').checked = true;
            }
        });

        // Forgot password
        document.getElementById('forgotPassword').addEventListener('click', function (e) {
            e.preventDefault();
            showToast('Please contact admin to reset your password.', 'warning');
        });

        // ── Login validation helpers ──
        function setLoginError(fieldId, message) {
            const el = document.getElementById(fieldId);
            const errEl = document.getElementById('err-' + fieldId);
            if (el) { el.classList.add('is-invalid'); el.classList.remove('is-valid'); }
            if (errEl) errEl.textContent = message;
        }
        function setLoginValid(fieldId) {
            const el = document.getElementById(fieldId);
            const errEl = document.getElementById('err-' + fieldId);
            if (el) { el.classList.remove('is-invalid'); el.classList.add('is-valid'); }
            if (errEl) errEl.textContent = '';
        }

        // Clear errors on input
        ['idNumber', 'password'].forEach(fieldId => {
            const el = document.getElementById(fieldId);
            if (el) {
                el.addEventListener('input', function () {
                    if (this.classList.contains('is-invalid')) {
                        if (this.value.trim()) {
                            setLoginValid(fieldId);
                        }
                    }
                });
                el.addEventListener('blur', function () {
                    if (!this.value.trim()) {
                        setLoginError(fieldId, fieldId === 'idNumber' ? 'ID Number is required' : 'Password is required');
                    }
                });
            }
        });

        // Login form submission
        document.getElementById('loginForm').addEventListener('submit', async function (e) {
            e.preventDefault();

            const idNumber = document.getElementById('idNumber').value.trim();
            const password = document.getElementById('password').value;
            const remember = document.getElementById('rememberMe').checked;
            const loginBtn = document.getElementById('loginBtn');

            // Validation
            let hasError = false;
            if (!idNumber) {
                setLoginError('idNumber', 'ID Number is required');
                hasError = true;
            } else {
                setLoginValid('idNumber');
            }
            if (!password) {
                setLoginError('password', 'Password is required');
                hasError = true;
            } else {
                setLoginValid('password');
            }
            if (hasError) {
                showToast('Please fill in all required fields', 'error');
                const firstInvalid = document.querySelector('.is-invalid');
                if (firstInvalid) firstInvalid.focus();
                return;
            }

            loginBtn.disabled = true;
            loginBtn.textContent = 'Signing in...';

            try {
                const res = await fetch(`${API_BASE}?action=login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ id_number: idNumber, password: password })
                });
                const data = await res.json();

                if (data.success) {
                    if (remember) {
                        localStorage.setItem('ccs_remember_id', idNumber);
                    } else {
                        localStorage.removeItem('ccs_remember_id');
                    }
                    showToast('Login successful! Welcome back.', 'success');
                    // Store user data
                    localStorage.setItem('ccs_user', JSON.stringify(data.user));
                    // Redirect to dashboard
                    setTimeout(() => {
                        window.location.href = 'dashboard.html';
                    }, 1500);
                } else {
                    showToast(data.message || 'Login failed', 'error');
                }
            } catch (err) {
                showToast('Network error. Please try again.', 'error');
            } finally {
                loginBtn.disabled = false;
                loginBtn.textContent = 'Login';
            }
        });
    </script>
</body>
</html>
